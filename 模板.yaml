secret: "clash"
#缓存设置
profile:
  store-selected: true
  store-fake-ip: true
#GEO数据库
geodata-mode: true
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
#启动参数
allow-lan: true
mode: rule
log-level: error
ipv6: false
unified-delay: true
hosts:
  services.googleapis.cn: 74.125.193.94
  time.android.com: 203.107.6.88
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.apple.com'
dns:
  enable: true
  ipv6: false
  listen: :23453
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 'system'
    - 223.5.5.5
    - 119.29.29.29
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - tls://1.1.1.1
    - 1.1.1.1
    - 8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  nameserver-policy:
    "geosite:cn":
      - 'system'
      - 223.5.5.5
      - 119.29.29.29
      - https://doh.pub/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://doh.pub/dns-query
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '+.hyeon.cn'
    - '+.lan'
    - '+.local'
    - '+.msftncsi.com'
    - 'msftconnecttest.com'
